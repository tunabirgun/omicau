# Publish omicau to PyPI on a GitHub Release, using trusted publishing (OIDC):
# no API token or password is stored in the repo. Enable it once by registering
# this repo as a trusted publisher on PyPI:
#   https://pypi.org/manage/account/publishing/  ->  project: omicau,
#   owner: tunabirgun, repo: omicau, workflow: publish-pypi.yml, environment: pypi
# After that, cutting a GitHub Release (tag v0.1.0, ...) builds and publishes
# the sdist + wheel automatically, so `pip install omicau` / `pipx install omicau`
# resolve for everyone. Test first against TestPyPI if you prefer.
name: publish-pypi

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
