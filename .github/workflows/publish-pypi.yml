# Automatically publish omicau to PyPI whenever you push a version tag (or cut a
# GitHub Release). Uses trusted publishing (OIDC) -- no API token stored in the repo.
#
# ONE-TIME SETUP (register this repo as a PyPI trusted publisher):
#   https://pypi.org/manage/account/publishing/  ->  project: omicau,
#   owner: tunabirgun, repo: omicau, workflow: publish-pypi.yml, environment: pypi
#
# THEN, to ship an update (see RELEASING.md):
#   1. bump `version` in pyproject.toml (PyPI never accepts a duplicate version)
#   2. git commit + push
#   3. git tag vX.Y.Z && git push --tags   ->  this workflow builds + publishes to PyPI
# conda-forge then auto-follows PyPI via its autotick bot.
name: publish-pypi

on:
  push:
    tags: ["v*"]          # a version tag publishes automatically
  release:
    types: [published]    # a GitHub Release also publishes
  workflow_dispatch:      # or run it by hand

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify the tag matches the package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "tag=$TAG  pyproject=$VER"
          if [ "$TAG" != "$VER" ]; then
            echo "::error::tag v$TAG does not match pyproject version $VER -- bump pyproject.toml"
            exit 1
          fi
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true   # don't hard-fail if this version is already on PyPI
